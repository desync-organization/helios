name: Member 2 control plane

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  control-plane:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run --cwd "Member 2" check
      - run: bun run --cwd "Member 2" check:policies
      - run: bun run test:contracts
      - run: bun run test:integration
      - run: bun run build

  quality-gate:
    if: ${{ hashFiles('evals/**') != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: bun install --frozen-lockfile
      - name: Run Member 3 evaluator for safety-sensitive changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -Eq '^(agents|adapters|policy|runtime|training|evals)/'; then
            python -m pytest evals -q
            bun run --cwd "Member 2" ci:eval-gate ../evals/reports/latest.json
          else
            echo "No safety-sensitive evaluation inputs changed."
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-gate-report
          path: evals/reports/*.json
          if-no-files-found: ignore
